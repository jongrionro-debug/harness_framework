services:
  postgres:
    image: postgres:16-alpine
    container_name: harness_framework_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: harness_framework
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - harness_framework_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d harness_framework"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  harness_framework_postgres_data:
